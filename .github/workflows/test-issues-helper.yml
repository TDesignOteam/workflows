name: test-issues-helper
on:
  pull_request:
    branches:
      - main
    paths:
      - actions/issues-helper/dist/*

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: test
        uses: ./actions/issues-helper
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          actions: find-issues
