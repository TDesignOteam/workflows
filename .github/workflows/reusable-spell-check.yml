name: spell-check
on:
  workflow_call:
    inputs:
      config:
        required: false
        type: string
        default: ''

jobs:
  check:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check spelling
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
        with:
          config: ${{ inputs.config }}
