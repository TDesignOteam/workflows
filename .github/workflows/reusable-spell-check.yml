name: spell-check
on:
  workflow_call:
    inputs:
      config:
        required: false
        type: string
        default: ''

jobs:
  check:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check spelling
        uses: crate-ci/typos@aca895bf05aec0cb7dffa6f94495e923224d9f17 # v1.46.2
        with:
          config: ${{ inputs.config }}
