name: test-upgrade-deps
on:
  pull_request:
    branches:
      - main
    paths:
      - actions/upgrade-deps/dist/*

jobs:
  tdesign-vue:
    name: tdesign-vue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: test
        uses: ./actions/upgrade-deps
        with:
          token: ${{ github.token }}
          dry-run: true
          repo: tdesign-vue
          owner: Tencent
          deps: |
            @tdesign/site-components
            @tdesign/theme-generator

  tdesign-vue-next:
    name: tdesign-vue-next
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: test
        uses: ./actions/upgrade-deps
        with:
          token: ${{ github.token }}
          dry-run: true
          repo: tdesign-vue-next
          owner: Tencent
          package-manager: pnpm
          title: 'chore(deps): Upgrade site-components and theme-generator'
          deps: |
            @tdesign/site-components
            @tdesign/theme-generator

  tdesign-icons-vue-next:
    name: tdesign-icons-vue-next
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: test
        uses: ./actions/upgrade-deps
        with:
          token: ${{ github.token }}
          dry-run: true
          repo: tdesign-vue-next
          owner: Tencent
          package-manager: pnpm
          deps: tdesign-icons-vue-next

  tdesign:
    name: tdesign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: test
        uses: ./actions/upgrade-deps
        with:
          token: ${{ github.token }}
          dry-run: true
          repo: tdesign
          owner: Tencent
          package-manager: pnpm
          deps: tdesign-icons-view

