name: reusable-unit-test
on:
  workflow_call:
    inputs:
      skip-site:
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: string
        default: '22'
      node-version-file:
        required: false
        type: string
        default: ''
      package-manager:
        required: false
        type: string
        default: npm

jobs:
  check-email:
    runs-on: ubuntu-latest
    steps:
      - uses: TDesignOteam/workflows/actions/check-email@03665411530c1eeaab075891d2ae88d9fe77cbc5 # main

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        if: ${{ inputs.package-manager == 'pnpm' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version-file == '' && inputs.node-version || null }}
          node-version-file: ${{ inputs.node-version-file != '' && inputs.node-version-file || null }}

      - run: ${{ inputs.package-manager }} install

      - run: ${{ inputs.package-manager }} run lint
      - run: ${{ inputs.package-manager }} run test
      # upload report to codecov
      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  site:
    if: ${{ !inputs.skip-site }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        if: ${{ inputs.package-manager == 'pnpm' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version-file == '' && inputs.node-version || null }}
          node-version-file: ${{ inputs.node-version-file != '' && inputs.node-version-file || null }}

      - run: ${{ inputs.package-manager }} install

      - name: Build site
        run: ${{ inputs.package-manager }} run site:preview

      - run: |
          zip -r _site.zip _site

      - name: upload _site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: _site
          path: _site.zip
          retention-days: 5

      - name: Save PR number
        if: ${{ always() }}
        run: echo ${{ github.event.number }} > ./pr-id.txt

      - name: Upload PR number
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr
          path: ./pr-id.txt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        if: ${{ inputs.package-manager == 'pnpm' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version-file == '' && inputs.node-version || null }}
          node-version-file: ${{ inputs.node-version-file != '' && inputs.node-version-file || null }}

      - run: ${{ inputs.package-manager }} install

      - name: Build
        run: ${{ inputs.package-manager }} run build
