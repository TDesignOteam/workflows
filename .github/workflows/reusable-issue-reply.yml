# 当打上 "Need Reproduce" 标签时，自动提示提供重现实例
name: Issue Reply

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
      login:
        required: true
        type: string
      token:
        required: false
        type: string
        default: ''
    secrets:
      GITHUB_TOKEN:
        required: false

jobs:
  issue-reply:
    runs-on: ubuntu-latest
    steps:
      - uses: TDesignOteam/workflows/actions/issues-helper@main
        with:
          actions: create-comment
          token: ${{ inputs.token || secrets.GITHUB_TOKEN }}
          issue-number: ${{ inputs.issue-number }}
          body: |
            你好 @${{ inputs.login }}, 我们需要你提供一个在线的重现实例以便于我们帮你排查问题。你可以通过点击 [此处](https://codesandbox.io/) 创建一个 codesandbox 或者提供一个最小化的 GitHub 仓库。请确保选择准确的版本。
